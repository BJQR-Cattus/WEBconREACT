services:

  api:
    build: .
    container_name: dra_api

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - db

  db:
    image: postgres:17

    container_name: dra_postgres

    restart: always

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4

    container_name: dra_pgadmin

    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dra.gob.pe
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - db

volumes:
  postgres_data: